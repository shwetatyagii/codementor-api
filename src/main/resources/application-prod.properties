# ==========================================
# APPLICATION
# ==========================================
spring.application.name=codementor-ai-api
server.port=${PORT:8081}

# ==========================================
# MYSQL DATABASE
# ==========================================
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / HIBERNATE
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ==========================================
# JWT
# ==========================================
jwt.secret=${JWT_SECRET:c29tZVZlcnlMb25nU2VjcmV0S2V5Rm9yQ29kZU1lbnRvckFJQXBwbGljYXRpb24yMDI1}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ==========================================
# AI (Groq)
# ==========================================
gemini.api.url=https://api.groq.com/openai/v1/chat/completions
gemini.api.key=${GROQ_API_KEY}
gemini.api.timeout=30000

# ==========================================
# CORS
# ==========================================
frontend.url=${FRONTEND_URL:http://localhost:5173}

# ==========================================
# SWAGGER
# ==========================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true

# ==========================================
# LOGGING
# ==========================================
logging.level.com.codementor=INFO
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n